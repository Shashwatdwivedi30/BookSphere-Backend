server.port=8084
spring.application.name=order-service
spring.data.mongodb.uri=mongodb://localhost:27017/booknest_orders

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# RabbitMQ Exchange and Queue Names
rabbitmq.exchange.name=order_exchange
rabbitmq.queue.name=order_queue
rabbitmq.routing.key=order_routing_key
